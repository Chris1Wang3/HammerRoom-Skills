<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>模糊需求接招采集表</title><style>:root{color-scheme:light dark;--bg:#f7f7f8;--fg:#171717;--field:#f1f1f2;--border:#d5d5d7;--accent:#2189d8;--error:#c83a3a;--r:12px;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}@media(prefers-color-scheme:dark){:root{--bg:#101010;--fg:#f4f4f4;--field:#2b2b2b;--border:#4a4a4a;--accent:#5ca8e5;--error:#ff7b7b}}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:16px/1.5 inherit}.wrap{max-width:1120px;margin:auto;padding:24px 20px 36px}form{display:grid;gap:24px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.field{display:grid;gap:7px}label,legend{font-weight:600}fieldset{border:0;padding:0;margin:0;display:grid;gap:10px}input[type=text],textarea,select{width:100%;border:1px solid var(--border);border-radius:var(--r);background:var(--field);color:var(--fg);font:inherit;padding:11px 14px}textarea{min-height:90px;resize:vertical}.choices{display:flex;flex-wrap:wrap;gap:12px 18px}.choice{display:flex;align-items:center;gap:8px;font-weight:400}.choice input{width:19px;height:19px;margin:0;accent-color:var(--accent)}button{width:100%;border:0;border-radius:var(--r);background:var(--fg);color:var(--bg);font:inherit;font-weight:600;padding:12px 18px}.result{display:none}.result.show{display:grid;gap:10px}.result textarea{min-height:210px;font-family:Consolas,monospace;font-size:13px}.error{color:var(--error)}@media(max-width:720px){.grid{grid-template-columns:1fr}.wrap{padding:18px 14px}}}</style></head><body><main class="wrap"><form id="form">
<div class="field"><label for="original">老板/业务原话</label><textarea id="original" name="original" required></textarea></div>
<div class="grid"><div class="field"><label for="urgency">紧急程度</label><select id="urgency" name="urgency"><option>今天要先回应</option><option selected>1-2 小时内开会对齐</option><option>准备开始写 PRD</option></select></div><div class="field"><label for="intent">已知目标或可能意图</label><textarea id="intent" name="intent"></textarea></div></div>
<div class="grid"><div class="field"><label for="users">目标用户/角色</label><textarea id="users" name="users"></textarea></div><div class="field"><label for="scenarios">核心场景</label><textarea id="scenarios" name="scenarios" placeholder="最多 3 个"></textarea></div></div>
<div class="grid"><div class="field"><label for="constraints">已知约束</label><textarea id="constraints" name="constraints"></textarea></div><div class="field"><label for="non-goals">明确不做什么</label><textarea id="non-goals" name="non_goals"></textarea></div></div>
<div class="grid"><fieldset><legend>交付档位</legend><div class="choices"><label class="choice"><input type="radio" name="level" value="L1 回话包" required>L1 回话包</label><label class="choice"><input type="radio" name="level" value="L2 对齐包">L2 对齐包</label><label class="choice"><input type="radio" name="level" value="L3 开写包">L3 开写包</label></div></fieldset><fieldset><legend>输出格式</legend><div class="choices"><label class="choice"><input type="radio" name="format" value="Markdown" required>Markdown</label><label class="choice"><input type="radio" name="format" value="HTML">HTML</label></div></fieldset></div>
<fieldset><legend>后续动作</legend><div class="choices"><label class="choice"><input type="radio" name="handoff" value="不继续评审" required>只生成接招包</label><label class="choice"><input type="radio" name="handoff" value="继续需求评审预演">继续评审预演</label></div></fieldset>
<p id="error" class="error" hidden>请完成原话、档位、格式和后续动作。</p><button type="submit">✓ 确认清单并开始拆解</button><section id="result" class="result"><textarea id="json" readonly></textarea><button id="copy" type="button">复制结构化参数</button></section>
</form></main><script>
const d={original:"",urgency:"1-2 小时内开会对齐",intent:"",users:"",scenarios:"",constraints:"",non_goals:"",level:"",format:"",handoff:"不继续评审"};const p=new URLSearchParams(location.search);try{Object.assign(d,p.get("prefill")?JSON.parse(p.get("prefill")): {})}catch{}const f=document.getElementById("form");for(const k of ["original","urgency","intent","users","scenarios","constraints","non_goals"]){f.elements[k].value=d[k]||""}for(const k of ["level","format","handoff"]){f.querySelectorAll(`[name="${k}"]`).forEach(e=>e.checked=e.value===d[k])}const v=n=>f.querySelector(`[name="${n}"]:checked`)?.value||"";const out=()=>({原话:f.elements.original.value.trim(),紧急程度:f.elements.urgency.value,目标或意图:f.elements.intent.value.trim()||"待确认",目标用户:f.elements.users.value.trim()||"待确认",核心场景:f.elements.scenarios.value.trim()||"待确认",已知约束:f.elements.constraints.value.trim()||"待确认",明确不做:f.elements.non_goals.value.trim()||"待确认",交付档位:v("level"),输出格式:v("format"),后续动作:v("handoff")});async function cp(t){try{await navigator.clipboard.writeText(t)}catch{}}f.onsubmit=async e=>{e.preventDefault();if(!f.reportValidity()){document.getElementById("error").hidden=false;return}const submission={schema_version:"1.0",skill:"vague-requirement-unpacker",action:"start_unpacking",data:out()};const t=JSON.stringify(submission,null,2);if(window.codex?.submitForm){await window.codex.submitForm(submission);return}if(window.openai?.sendFollowUpMessage){await window.openai.sendFollowUpMessage({title:"确认模糊需求采集表",prompt:`请按 vague-requirement-unpacker skill 使用以下已确认清单开始拆解：\n${t}`});return}document.getElementById("json").value=t;document.getElementById("result").classList.add("show");await cp(t)};document.getElementById("copy").onclick=()=>cp(document.getElementById("json").value);
</script></body></html>
