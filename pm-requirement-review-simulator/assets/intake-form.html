<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>需求评审信息采集清单</title>
<style>:root{color-scheme:dark light;--bg:#101010;--panel:#2d2d2d;--text:#f4f4f4;--muted:#aaa;--line:#4a4a4a;--accent:#69b7ff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 system-ui,"Microsoft YaHei",sans-serif}.wrap{max-width:1120px;margin:auto;padding:24px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 16px}label,legend{font-weight:700}input,textarea,select{width:100%;margin-top:7px;padding:10px 12px;border:1px solid var(--line);border-radius:13px;background:var(--panel);color:var(--text);font:inherit}textarea{min-height:94px;resize:vertical}fieldset{border:0;padding:0;margin:0}.choices{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:9px}.choices label{font-weight:400}.choices input{width:auto;margin:0 7px 0 0;accent-color:var(--accent)}.full{grid-column:1/-1}.action{position:sticky;bottom:0;padding-top:20px;background:linear-gradient(transparent,var(--bg) 30%)}button{width:100%;padding:11px;border:0;border-radius:13px;font:inherit;cursor:pointer}.status{min-height:24px;color:var(--muted);margin-top:7px}@media(max-width:720px){.grid{grid-template-columns:1fr}.full{grid-column:auto}.wrap{padding:16px}}</style></head>
<body><main class="wrap"><p>请补充或修改预填内容，勾选评审范围并选择输出格式。预填值只是推断，提交后才视为确认。</p><form id="form"><div class="grid">
<label>需求名称<input name="requirement_name" required></label><label>业务目标<input name="business_goal"></label><label class="full">核心功能<textarea name="core_features" required></textarea></label>
<label>行业<input name="industry"></label><label>公司规模<input name="company_size"></label><label>技术栈<input name="tech_stack"></label><label class="full">约束条件<textarea name="constraints"></textarea></label>
<fieldset class="full"><legend>评审角色</legend><div class="choices"><label><input type="checkbox" name="review_roles" value="技术">技术</label><label><input type="checkbox" name="review_roles" value="运营">运营</label><label><input type="checkbox" name="review_roles" value="设计">设计</label><label><input type="checkbox" name="review_roles" value="老板">老板</label><label><input type="checkbox" name="review_roles" value="法务">法务</label></div></fieldset>
<label>需求类型<select name="requirement_type"><option value="">请选择</option><option>新功能</option><option>功能优化</option><option>增长实验</option><option>内部工具</option><option>合规改造</option></select></label><label>PRD 来源<select name="prd_source"><option value="">请选择</option><option>完整 PRD</option><option>展示版</option><option>草稿</option><option>口述</option></select></label>
<fieldset class="full"><legend>可设为 N/A 的维度（逻辑自洽不可设为 N/A）</legend><div class="choices"><label><input type="checkbox" name="na_dimensions" value="技术友好">技术友好</label><label><input type="checkbox" name="na_dimensions" value="运营价值">运营价值</label><label><input type="checkbox" name="na_dimensions" value="老板满意">老板满意</label></div></fieldset>
<fieldset class="full"><legend>输出格式</legend><div class="choices"><label><input type="radio" name="output_format" value="Markdown" required>Markdown</label><label><input type="radio" name="output_format" value="HTML" required>HTML 可视化报告</label></div></fieldset>
</div><div class="action"><button type="submit">✓ 确认清单并开始评审</button><div id="status" class="status"></div></div></form></main>
<script>const f=document.querySelector('#form'),s=document.querySelector('#status');try{const p=JSON.parse(new URLSearchParams(location.search).get('prefill')||'{}');for(const[k,v]of Object.entries(p))[...f.elements].filter(x=>x.name===k).forEach(n=>{if(['checkbox','radio'].includes(n.type))n.checked=Array.isArray(v)?v.includes(n.value):v===n.value;else n.value=v??''})}catch(e){s.textContent='预填参数无法解析，可直接手动填写。'}f.addEventListener('submit',async e=>{e.preventDefault();const d={};for(const[k,v]of new FormData(f))d[k]=d[k]?[].concat(d[k],v):v;const p={schema_version:'1.0',skill:'pm-requirement-review-simulator',action:'start_review',data:d};if(window.codex?.submitForm){await window.codex.submitForm(p);s.textContent='已提交，正在开始评审。'}else if(window.openai?.sendFollowUpMessage){await window.openai.sendFollowUpMessage({title:'确认 PM 需求评审清单',prompt:`请按 pm-requirement-review-simulator skill 使用以下已确认清单开始评审：\n${JSON.stringify(p,null,2)}`});}else{await navigator.clipboard.writeText(JSON.stringify(p,null,2));s.textContent='结构化参数已复制到剪贴板。'}})</script></body></html>
