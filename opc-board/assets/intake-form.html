<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OPC Board 采集表</title>
<style>:root{color-scheme:light dark;--bg:#f7f7f8;--fg:#171717;--muted:#686868;--field:#f1f1f2;--border:#d5d5d7;--accent:#2189d8;--error:#c83a3a;--r:12px;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}@media(prefers-color-scheme:dark){:root{--bg:#101010;--fg:#f4f4f4;--muted:#a5a5a5;--field:#2b2b2b;--border:#4a4a4a;--accent:#5ca8e5;--error:#ff7b7b}}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:16px/1.5 inherit}.wrap{max-width:1120px;margin:auto;padding:24px 20px 36px}form{display:grid;gap:24px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.field{display:grid;gap:7px}label,legend{font-weight:600}fieldset{border:0;padding:0;margin:0;display:grid;gap:10px}input[type=text],textarea,select{width:100%;border:1px solid var(--border);border-radius:var(--r);background:var(--field);color:var(--fg);font:inherit;padding:11px 14px}textarea{min-height:90px;resize:vertical}.choices{display:flex;flex-wrap:wrap;gap:12px 18px}.choice{display:flex;align-items:center;gap:8px;font-weight:400}.choice input{width:19px;height:19px;margin:0;accent-color:var(--accent)}button{width:100%;border:0;border-radius:var(--r);background:var(--fg);color:var(--bg);font:inherit;font-weight:600;padding:12px 18px;cursor:pointer}.result{display:none}.result.show{display:grid;gap:10px}.result textarea{min-height:210px;font-family:Consolas,monospace;font-size:13px}.error{color:var(--error);margin:0}@media(max-width:720px){.grid{grid-template-columns:1fr}.wrap{padding:18px 14px}}}</style></head><body><main class="wrap"><form id="form">
<div class="grid"><div class="field"><label for="name">产品/想法名称</label><input id="name" name="name" type="text" required></div><div class="field"><label for="positioning">核心定位</label><textarea id="positioning" name="positioning" required></textarea></div></div>
<fieldset><legend>项目目标</legend><div class="choices"><label class="choice"><input type="radio" name="goal" value="盈利" required>盈利</label><label class="choice"><input type="radio" name="goal" value="开源">开源</label><label class="choice"><input type="radio" name="goal" value="实验">实验</label></div></fieldset>
<div class="grid"><div class="field"><label for="users">目标用户</label><textarea id="users" name="users"></textarea></div><div class="field"><label for="sustainability">商业模式或可持续策略</label><textarea id="sustainability" name="sustainability"></textarea></div></div>
<div class="grid"><div class="field"><label for="channel">冷启动渠道</label><textarea id="channel" name="channel"></textarea></div><div class="field"><label for="tech">技术栈</label><textarea id="tech" name="tech"></textarea></div></div>
<div class="grid"><div class="field"><label for="resources">个人资源</label><textarea id="resources" name="resources"></textarea></div><div class="field"><label for="constraints">约束条件</label><textarea id="constraints" name="constraints"></textarea></div></div>
<fieldset><legend>输出格式</legend><div class="choices"><label class="choice"><input type="radio" name="format" value="Markdown" required>Markdown 快速版</label><label class="choice"><input type="radio" name="format" value="HTML">HTML 专业版</label></div></fieldset>
<p id="error" class="error" hidden>请完成必填项并选择输出格式。</p><button type="submit">✓ 确认清单并开始压测</button><section id="result" class="result"><textarea id="json" readonly></textarea><button id="copy" type="button">复制结构化参数</button></section>
</form></main><script>
const defaults={name:"",positioning:"",goal:"",users:"",sustainability:"",channel:"",tech:"",resources:"",constraints:"",format:""};const params=new URLSearchParams(location.search);let incoming={};try{incoming=params.get("prefill")?JSON.parse(params.get("prefill")):{}}catch{}const data={...defaults,...incoming};const form=document.getElementById("form");for(const key of ["name","positioning","users","sustainability","channel","tech","resources","constraints"]){form.elements[key].value=data[key]||""}for(const key of ["goal","format"]){form.querySelectorAll(`[name="${key}"]`).forEach(el=>el.checked=el.value===data[key])}const val=n=>form.querySelector(`[name="${n}"]:checked`)?.value||"";const payload=()=>({产品或想法名称:form.elements.name.value.trim(),核心定位:form.elements.positioning.value.trim(),项目目标:val("goal"),目标用户:form.elements.users.value.trim()||"待补充",商业模式或可持续策略:form.elements.sustainability.value.trim()||"待补充",冷启动渠道:form.elements.channel.value.trim()||"待补充",技术栈:form.elements.tech.value.trim()||"待补充",个人资源:form.elements.resources.value.trim()||"待补充",约束条件:form.elements.constraints.value.trim()||"无",输出格式:val("format")});async function copy(t){try{await navigator.clipboard.writeText(t)}catch{}}form.addEventListener("submit",async e=>{e.preventDefault();if(!form.reportValidity()){document.getElementById("error").hidden=false;return}const submission={schema_version:"1.0",skill:"opc-board",action:"start_review",data:payload()};const text=JSON.stringify(submission,null,2);if(window.codex?.submitForm){await window.codex.submitForm(submission);return}if(window.openai?.sendFollowUpMessage){await window.openai.sendFollowUpMessage({title:"确认 OPC Board 清单",prompt:`请按 opc-board skill 使用以下已确认清单开始压测：\n${text}`});return}document.getElementById("json").value=text;document.getElementById("result").classList.add("show");await copy(text)});document.getElementById("copy").onclick=()=>copy(document.getElementById("json").value);
</script></body></html>
